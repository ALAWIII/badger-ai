name: Release browser builds

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "package.json version: $PKG_VERSION"
          echo "git tag version: $TAG_VERSION"

          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version does not match package.json version"
            exit 1
          fi

      - name: Type check
        run: npm run compile

      - name: Build release zips
        run: |
          npx wxt zip -b chrome
          npx wxt zip -b firefox
          npx wxt zip -b edge
          npx wxt zip -b safari

      - name: Show generated files
        run: ls -lah .output

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            .output/*.zip
